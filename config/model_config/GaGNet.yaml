model:
  name: GaGNet

metrics:
  train_metrics:
    mse:
      name: MeanSquaredError
  val_metrics:
    mse:
      name: MeanSquaredError
    si_sdr:
      name: ScaleInvariantSignalDistortionRatio
    stoi:
      name: ShortTimeObjectiveIntelligibility
      params:
        fs: 16000
    pesq:
      name: PerceptualEvaluationSpeechQuality
      params:
        fs: 16000
        mode: wb
  test_metrics:
    mse:
      name: MeanSquaredError
    si_sdr:
      name: ScaleInvariantSignalDistortionRatio
    stoi:
      name: ShortTimeObjectiveIntelligibility
      params:
        fs: 16000
    pesq:
      name: PerceptualEvaluationSpeechQuality
      params:
        fs: 16000
        mode: wb
